{% extends 'base.html' %}

{% block content %}

<div class="login-box">

    <h2>Student Login</h2>

    <form method="POST">

        {% csrf_token %}

        <input type="text" name="username" placeholder="Username">

        <input type="password" name="password" placeholder="Password">

        <button type="submit">Login</button>

    </form>

</div>
<p class="mt-3">

<a href="/password-reset/">

Forgot Password?

</a>

</p>

{% endblock %}
